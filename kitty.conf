# Keep enough room for the closing glyph even when the tab text is busy.
tab_title_max_length 48

# --- Core Settings ---
scrollback_lines            500
dynamic_background_opacity yes
allow_remote_control       no
macos_show_window_title_in none
window_padding_width       0
window_margin_width        0

hide_window_decorations    no
draw_minimal_borders       yes
enable_audio_bell          no
cursor_shape               block
cursor_blink_interval      0 
confirm_os_window_close    0
shell_integration          enabled

# --- Background & Opacity ---
background_image           none
background_opacity         0.58
background_blur            32
macos_colorspace           default
macos_titlebar_color       background

# --- Fonts ---
# BEGIN_KITTY_FONTS
font_family      family="Fira Code" postscript_name=FiraCode-Retina
bold_font        family="Fira Code" postscript_name=FiraCode-Bold
italic_font      family="Fira Code" postscript_name=FiraCode-Retina
bold_italic_font family="Fira Code" postscript_name=FiraCode-Bold
# END_KITTY_FONTS
font_size         16.0
disable_ligatures never
font_features FiraCode-Retina +calt +liga
font_features FiraCode-Bold +calt +liga
text_composition_strategy 1.0 0

# This forces Kitty to treat the pill symbols and chosen tab emoji as exactly
# 1-cell wide so the closing cap keeps its space.
narrow_symbols U+e0b4,U+e0b6 1
narrow_symbols U+2728,U+1F984,U+1F36C,U+1F52E,U+1F344,U+1F3A8,U+1F3A1,U+1F48E,U+1F9A9,U+1F680,U+1F496,U+1F369,U+1F99C,U+1F947,U+1F386,U+1F47E 1

# --- Theme ---
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME
inactive_text_alpha 0.6

# --- Layouts ---
enabled_layouts splits,stack

# --- Tab Bar Styling ---
tab_bar_edge            bottom
tab_bar_style           separator
# A single space cleanly separates pills without adding visual clutter.
tab_separator           " "
tab_bar_margin_height   0 0
# Lowering this ensures more horizontal room for the tabs to render fully
tab_bar_margin_width    0
tab_bar_background      #000000

# ACTIVE TAB: [Index]:program:folder:emoji
# Prefer kitty's oldest foreground executable because it is the more stable
# built-in signal when multiple processes share the foreground group. Keep the
# expensive tab lookups to one exe probe and one cwd probe per tab render.
active_tab_foreground   #141414
active_tab_background   #141414 
active_tab_font_style   bold
active_tab_title_template "{fmt.fg._89d185}{fmt.bg._89d185}{fmt.fg._141414}{((wd := (tab.active_wd or '').rsplit('/', 1)[-1]), (title_base := title.rsplit('/', 1)[-1] if title else ''), (exe_name := (tab.active_oldest_exe or '').rsplit('/', 1)[-1]), (prog := (((exe_name if exe_name not in ['', 'starship'] else '') or 'shell')[:10])), (folder := ((((wd if wd and wd != '~' else '') or (title_base if title_base not in ['', prog] else '') or 'Home'))[:14])), (emoji := ['✨', '🦄', '🍬', '🔮', '🍄', '🎨', '🎡', '💎', '🦩', '🚀', '💖', '🍩', '🦜', '🥇', '🎆', '👾'][index % 16]), (body := (' %s:%s:%s:%s ' % (index, prog, folder, emoji))), (body[:(max_title_length - 2 if max_title_length > 2 else max_title_length)]))[-1]}{fmt.fg._89d185}{fmt.bg._141414}"

# INACTIVE TABS: [Index]:program:folder:emoji
# Match the active-tab oldest-process logic so both templates render
# consistently when a tab is first created.
inactive_tab_foreground #7aa2f7
inactive_tab_background #141414
inactive_tab_font_style normal
tab_title_template "{fmt.fg._24283b}{fmt.bg._24283b}{fmt.fg._7aa2f7}{((wd := (tab.active_wd or '').rsplit('/', 1)[-1]), (title_base := title.rsplit('/', 1)[-1] if title else ''), (exe_name := (tab.active_oldest_exe or '').rsplit('/', 1)[-1]), (prog := (((exe_name if exe_name not in ['', 'starship'] else '') or 'shell')[:10])), (folder := ((((wd if wd and wd != '~' else '') or (title_base if title_base not in ['', prog] else '') or 'Home'))[:14])), (emoji := ['✨', '🦄', '🍬', '🔮', '🍄', '🎨', '🎡', '💎', '🦩', '🚀', '💖', '🍩', '🦜', '🥇', '🎆', '👾'][index % 16]), (body := (' %s:%s:%s:%s ' % (index, prog, folder, emoji))), (body[:(max_title_length - 2 if max_title_length > 2 else max_title_length)]))[-1]}{fmt.fg._24283b}{fmt.bg._141414}"

# --- Keyboard Shortcuts ---

# Opacity presets
map cmd+shift+o set_background_opacity 1.0
map cmd+shift+p set_background_opacity 0.58


# Splitting Windows
map cmd+shift+v launch --location=vsplit --cwd=current
map cmd+shift+h launch --location=hsplit --cwd=current
map cmd+shift+d close_window
map cmd+enter   new_window

# Moving Focus between Splits
map cmd+h neighboring_window left
map cmd+l neighboring_window right
map cmd+k neighboring_window up
map cmd+j neighboring_window down

# Moving Splits (Position)
map alt+k move_window up
map alt+h move_window left
map alt+l move_window right
map alt+j move_window down

# Resizing Splits
map ctrl+cmd+left  resize_window narrower 2
map ctrl+cmd+right resize_window wider 2
map ctrl+cmd+up    resize_window taller 2
map ctrl+cmd+down  resize_window shorter 2
map ctrl+cmd+r     resize_window reset

# Layout Management
map cmd+i next_layout
map cmd+o last_used_layout
map cmd+z toggle_layout stack

# Tab Management
map cmd+t new_tab_with_cwd
map alt+n next_tab
map alt+p previous_tab
map cmd+w>h move_tab_backward
map cmd+w>l move_tab_forward

# Jump to specific Tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 10 

# Window Controls
map cmd+n next_window
map cmd+p previous_window

# Text Navigation (macOS style)
map alt+left  send_text all \x1b\x62
map alt+right send_text all \x1b\x66
map cmd+left  send_text all \x01
map cmd+right send_text all \x05
